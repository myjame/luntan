version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: luntan-app-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-论坛}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/luntan}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SESSION_SECRET: ${SESSION_SECRET:-replace-this-in-production}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - postgres
      - redis
    command: sh -c "npm run db:migrate:deploy && npm run start"

  postgres:
    image: postgres:17-alpine
    container_name: luntan-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: luntan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: luntan-redis-prod
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  uploads-data:
  postgres-data:
  redis-data:
