version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luntan-app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_NAME: 论坛
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/luntan
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: change-me
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    container_name: luntan-postgres
    environment:
      POSTGRES_DB: luntan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: luntan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
